<h2 class="sm:text-2xl text-xl font-extrabold mb-5">Attendance calendar</h2>

<div class="calendar-box">
    <div class="calendar-header flex w-full bg-blue-400 text-white font-bold sm:text-xl text-base">
        @for(day of days; track day) {
            <span class="calendar-cell">{{day}}</span>
        }
    </div>

    <div class="calendar-body w-full">
        @for(calendarBlock of calendarBlocks; track $index; let blockIndex = $index) {
            <div>
                @for(calendarDate of calendarBlock; track $index) {
                    <button
                        (click)="handleCellClick(blockIndex, calendarDate)"
                        [class.disabled-box]="isDisabled(blockIndex, calendarDate)" 
                        class="calendar-cell"
                    >
                        {{calendarDate}}
                    </button>
                }
            </div>
        }
    </div>
</div>

@if(isTimeSheetModelOpen()) {
    <div
        app-modal
        [(isShown)]="isTimeSheetModelOpen"
        [modalTitle]="'Timesheet'"
    >
       <div attendance-modal-form (isSubmitted)="handleCloseBtnClick()"></div>
    </div>
}
