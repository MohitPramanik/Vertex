<section
    app-table
    [tableLabel]="'Departments'"
    [headerButtonLabel]="'Add'"
    (headerButtonActionClicked)="openCreateDepartmentModal()"
    [tableHeaders]="['Department Name', 'Head of Department', 'No. of Employees', 'Open Positions', 'Status', 'Actions']"
    [tableData]="departments"
    [tableDataSequence]="['name', 'head', 'employeeCount','openPositions', 'status', '']"
></section>

@if(isCreateDepartmentModalOpen()) {
    <div
        app-modal
        [modalTitle]="'Create Department'"
        [(isShown)]="isCreateDepartmentModalOpen"
    >
        <div app-create-department-modal (emitClose)="closeCreateDepartmentModal()" class="w-full"></div>
    </div>
}
