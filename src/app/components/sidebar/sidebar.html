<div class="sidebar z-100" [class.sidebar-close]="!isSidebarOpen()">

    <div class="flex flex-col relative w-[14rem] h-full!">
        <button (click)="toggleSidebar()" class="toggle-btn">
            @if(isSidebarOpen()) {
                <i class="fa-solid fa-chevron-left"></i>
            } @else {
                <i class="fa-solid fa-chevron-right"></i>
            }
            
        </button>

        <ul class="overflow-y-auto">
            @for(menu of filteredOptions(); track menu.title) {
                <li class="sidebar-list-item">
                    @if(menu.path) {
                        <a class="slidebar-link" routerLink="{{menu.path}}" [title]="isSidebarOpen() ? '' : menu.title">
                            <i class="fa-solid" [class]="menu.icon"></i>
                            <span class="ml-2">{{menu.title}}</span>
                        </a>
                    }
                    @else if(menu.children) {
                        <details>
                            <summary class="px-4 py-2" [title]="isSidebarOpen() ? '' : menu.title">
                                <span class="arrow-icon">
                                    <i class="fa-solid fa-chevron-right"></i>
                                </span>
                                <i class="fa-solid" [class]="menu.icon"></i>
                            <span class="ml-2">{{menu.title}}</span> 
                            </summary>
                            @for(item of menu.children; track item.title) {
                                <li [title]="isSidebarOpen() ? '' : item.title">
                                    <a class="slidebar-link" routerLink="{{item.path}}">
                                        <i class="fa-solid fa-link"></i>
                                        <span class="ml-2">{{item.title}}</span>
                                    </a>
                                </li>
                            }
                        </details>
                    }
                </li>
            }
        </ul>

    </div>
</div>

@if(isSidebarOpen()) {
    <div class="block md:hidden w-full h-full bg-black fixed opacity-[0.8] z-99"></div>
}
