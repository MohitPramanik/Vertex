<form class="attendance-box flex flex-wrap rounded-lg!" [class.appear]="isTimeSheetModelOpen()" [formGroup]="form" (ngSubmit)="submit()">

    <div class="w-full mb-2">
        <h2 class="font-bold text-xl float-left">Timesheet</h2>
        <button type="button" class="float-right text-lg cursor-pointer" (click)="close()">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- First row -->
    <div class="sm:flex w-full gap-2 items-center h-max">
        <div class="input-field-wrapper sm:w-1/2!">
            <label for="date">Date</label>
            <input type="date" id="date" class="form-field" [max]="maxDate" [min]="minDate" formControlName="date">
        </div>

        <div class="input-field-wrapper sm:w-1/2! inline-block">
            <label for="work-hours">Working hours</label>
            <select id="work-hours" class="form-field" formControlName="hours">
                <option value="" disabled selected>Select</option>
                @for(item of workHours; track $index; let i = $index) {
                <option [value]="i+1">{{i + 1}} Hours</option>
                }
            </select>
        </div>
    </div>


    <div class="input-field-wrapper">
        <label for="project">Project</label>
        <select id="project" class="form-field" formControlName="project">
            <option value="" disabled selected>Select</option>
            @for(item of projects; track item) {
            <option value="{{item}}">{{item}}</option>
            }
        </select>
    </div>

    <div class="input-field-wrapper">
        <label for="description">Description</label>
        <textarea id="description" class="form-field" rows="5" formControlName="description"></textarea>
    </div>

    @if(error()) {
        <div class="w-full text-sm text-red-700 bg-red-50 border border-red-200 px-3 py-2 rounded-md mb-3">
            {{error()}}
        </div>
    }

    <div class="w-full">
        <button class="btn float-right" type="submit">{{isEdit() ? "Update" : "Submit"}}</button>
    </div>

</form>
