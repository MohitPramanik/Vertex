  <div class="page-header">

  </div>

  <!-- Filters Section -->

    <div class="filter-item">
      <label>Year</label>
      <select>
        <option value="">All</option>
      </select>
    </div>

    <div class="filter-item">
      <label>Month</label>
      <select>

      </select>
    </div>

    <div class="filter-item">
      <button class="filter-btn">Filter</button>

      <tbody>

        <tr>
          <td>1</td>

          <td>
            <button class="download-btn">Download</button>

      </tbody>

    </table>

  </div>

</div>
