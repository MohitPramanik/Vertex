<!-- Input Section -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <!-- Skill -->
    <div class="input-field-wrapper">
        <label for="skill" class="block text-sm font-medium mb-1">Skill</label>
        <input id="skill" type="text" class="form-field w-full" placeholder="e.g. Angular">
    </div>

    <!-- Years -->
    <div class="input-field-wrapper">
        <label for="years" class="block text-sm font-medium mb-1">
            Experience (Years)
        </label>
        <input id="years" type="number" class="form-field w-full" min="0" value="0">
    </div>

    <!-- Months -->
    <div class="input-field-wrapper">
        <label for="months" class="block text-sm font-medium mb-1">
            Experience (Months)
        </label>
        <input id="months" type="number" class="form-field w-full" min="0" max="12" value="0">
    </div>

</div>

<!-- Add Button -->
<div>
    <button class="btn px-5 py-2">
        Add Skill
    </button>
</div>

<!-- Skills Display -->
<div class="flex flex-wrap gap-3 pt-2">

    @for (skill of skills(); track skill.technology) {
    <div class="flex items-center gap-2 px-3 py-1.5
        bg-blue-50 text-blue-700 rounded-full text-sm
        border border-blue-200">
        <span class="font-medium">
            {{ skill.technology }}
        </span>

        <button class="text-blue-500 hover:text-red-500 transition" aria-label="Remove skill">
            <i class="fa-solid fa-xmark text-xs"></i>
        </button>
    </div>
    }

</div>
