<div class="flex justify-between items-center mb-4">
  <div>
    <h2 class="sm:text-2xl text-xl font-extrabold">Company settings</h2>
    <p class="text-sm text-gray-700">Defaults used across the portal</p>
  </div>
  <a routerLink="/settings" class="btn">Back</a>
</div>

<form class="card" [formGroup]="form" (ngSubmit)="save()">
  <div class="grid sm:grid-cols-2 grid-cols-1 gap-4">
    <div class="field">
      <label for="companyName">Company name</label>
      <input id="companyName" class="control" type="text" formControlName="companyName" />
    </div>

    <div class="field">
      <label for="hrEmail">HR email</label>
      <input id="hrEmail" class="control" type="email" formControlName="hrEmail" />
    </div>

    <div class="field">
      <label for="timezone">Timezone</label>
      <select id="timezone" class="control" formControlName="timezone">
        @for(tz of timezones; track tz) {
          <option [value]="tz">{{tz}}</option>
        }
      </select>
    </div>

    <div class="field">
      <label for="weekStartsOn">Week starts on</label>
      <select id="weekStartsOn" class="control" formControlName="weekStartsOn">
        <option value="Monday">Monday</option>
        <option value="Sunday">Sunday</option>
      </select>
    </div>
  </div>

  <div class="mt-5">
    <h3 class="font-bold text-lg mb-2">Working days</h3>
    <div class="day-grid">
      @for(d of days; track d) {
        <button
          type="button"
          class="day-pill"
          [class.active]="form.controls.workingDays.value[d]"
          (click)="toggleDay(d)"
        >
          {{d}}
        </button>
      }
    </div>
    <p class="text-xs text-gray-600 mt-2">Current: {{store.workingDaysLabel()}}</p>
  </div>

  <div class="mt-5">
    <h3 class="font-bold text-lg mb-2">Default leave policy (days/year)</h3>
    <div class="grid sm:grid-cols-3 grid-cols-1 gap-4">
      <div class="field">
        <label for="annual">Annual</label>
        <input id="annual" class="control" type="number" formControlName="annual" />
      </div>
      <div class="field">
        <label for="sick">Sick</label>
        <input id="sick" class="control" type="number" formControlName="sick" />
      </div>
      <div class="field">
        <label for="casual">Casual</label>
        <input id="casual" class="control" type="number" formControlName="casual" />
      </div>
    </div>
  </div>

  @if(error()) {
    <div class="alert error">{{error()}}</div>
  }
  @if(saved()) {
    <div class="alert success">Saved. Updated at {{store.setting().updatedAt.slice(0, 19).replace('T', ' ')}}.</div>
  }

  <div class="flex justify-end mt-4">
    <button class="btn" type="submit">Save settings</button>
  </div>
</form>
