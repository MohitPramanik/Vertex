@if(role === "employee") {
	<section 
		class="w-full"
		app-table 
		[tableLabel]="'Leave requests'" 
		[tableHeaders]="['Type', 'From', 'To', 'Applied Date', 'Status', 'Actions']" 
		[tableData]="leaveRequests()"
		[tableDataSequence]="['leaveType', 'from', 'to', 'createdAt', ['status', 'capitalize'], '']"
		[pagination]="true"
	></section>
}
@else {
	<section 
		class="w-full"
		app-table 
		[tableLabel]="'Leave requests'" 
		[tableHeaders]="['Employee ID', 'Name', 'Type', 'From', 'To', 'Status', 'Actions']" 
		[tableData]="leaveRequests()"
		[tableDataSequence]="['employee.empId', 'employee.user.username', 'leaveType', 'from', 'to', 'status', '']"
		[pagination]="true"
	></section>
}
