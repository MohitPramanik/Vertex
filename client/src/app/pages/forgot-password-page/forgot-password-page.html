<div class="min-h-full flex items-center justify-center">

  <div class="w-full max-w-md bg-white p-6 rounded-xl shadow-xl" animate.enter="appear-up">

    <h2 class="text-2xl font-semibold text-center mb-1">
      Forgot Password
    </h2>
    <p class="text-sm text-gray-500 text-center mb-6">
      Enter your email to receive a password reset link
    </p>

    <form class="space-y-4" #form="ngForm" (ngSubmit)="onSubmit()">

      <div class="input-field-wrapper">
        <label for="email" class="form-label">Email</label>
        <input type="email" placeholder="Enter your email" id="email" name="email" #emailRef="ngModel" required
          [(ngModel)]="email" class="form-field" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$"  autocomplete="on">
          <p [hidden]="emailRef.pristine || (emailRef.valid && emailRef.touched)" class="text-red-500 text-xs">Please enter a valid email</p>
      </div>

      <button [disabled]="form.invalid" class="btn w-full"> Send Reset Link </button>

    </form>

    <p class="text-sm text-center mt-5">
      Remember your password?
      <a routerLink="/login" class="text-blue-600 hover:underline ml-1">
        Back to Login
      </a>
    </p>

  </div>

</div>
