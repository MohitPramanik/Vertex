<div class="h-full flex flex-col items-center justify-center bg-gray-50 px-4 text-center">

  <h1 class="text-6xl font-bold text-blue-600 mb-4">404</h1>
  <h2 class="text-xl font-semibold mb-2">Page Not Found</h2>

  <p class="text-gray-500 mb-6 max-w-md">
    The page you are looking for might have been removed,
    had its name changed, or is temporarily unavailable.
  </p>

  <div class="flex gap-3">
    <a routerLink="/" class="btn">Go To Dashboard</a>
    <button (click)="goBack()" class="btn-outline">
      Go Back
    </button>

  </div>

</div>
