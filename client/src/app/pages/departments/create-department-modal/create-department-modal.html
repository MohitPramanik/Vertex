<form class="w-full" [formGroup]="department" (ngSubmit)="onSubmit()">

    <div class="input-field-wrapper">
        <label class="form-label">Department Name</label>
        <input type="text" class="form-field" placeholder="Enter department name" formControlName="name" />

        @if(showError('name', 'required')) {
            <p class="form-error-msg">This field is required</p>
        }
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Head of Department</label>
        <select class="form-field" formControlName="head">
            <option value="">Select department head</option>
            <option>Amit Sharma</option>
            <option>Priya Verma</option>
            <option>Rahul Singh</option>
            <option>Sneha Kapoor</option>
            <option>Sneha Kapoori</option>
        </select>

        @if(showError('departmentHead', 'required')) {
            <p class="form-error-msg">This field is required</p>
        }
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Open Positions</label>
        <input type="number" class="form-field" min="0" value="0" formControlName="openPositions" />

        @if(showError('openPositions', 'min')) {
            <p class="form-error-msg">Value can't be negative</p>
        }
    </div>

    <div class="input-field-wrapper">
        <label class="form-label">Status</label>

        <select class="form-field" formControlName="status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
        </select>

        @if(showError('status', 'required')) {
            <p class="form-error-msg">This field is required</p>
        }
    </div>

    <div class="flex justify-end gap-3 mt-5">
        <button type="button" class="btn-outline" (click)="onCancel()">
            Cancel
        </button>
        

        <button type="submit" class="btn">
            Save Department
        </button>
    </div>

</form>
