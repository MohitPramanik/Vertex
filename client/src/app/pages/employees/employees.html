<section 
    app-table 
    [tableLabel]="'Employees List'"
    [tableHeaders]="['Employee ID', 'Name', 'Email', 'Department', 'Designation', 'Reporting Manager', 'Joining Date', 'Actions', ['Status', 'text-center!']]"
    [tableData]="employeesList()"
    [tableDataSequence]="['empId', 'user.username', 'user.email', 'work.department', 'work.designation', 'work.manager.username', 'work.doj', '', ['work.workStatus', 'batch']]"
>
    @if(restrictExport()) {
        <div th-action-area>
            <select 
                class="border border-1 border-gray-300 px-3 py-2 rounded-sm cursor-pointer" 
                (change)="handleActionSelection($event)"
            >
                <option value="" disabled selected>Action</option>
                <option value="addEmp">Add Employee</option>
                <option value="export">Export Data</option>
            </select>
        </div>
    }
    <div th-content-area>
        <div app-employee-filter></div>
    </div>
</section>
