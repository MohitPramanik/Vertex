<div class="notifications-container">

  <!-- Header -->
  <div class="header">
    <h2>Notifications</h2>
    <button class="mark-all-btn">Mark all as read</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter active">All</button>
    <button class="filter">Unread</button>
    <button class="filter">Important</button>
  </div>

  <!-- Notifications List -->
  <div class="notifications-list">

    <div class="notification unread">
      <div class="icon">🔔</div>

      <div class="content">
        <p class="message">
          Your password was changed successfully.
        </p>
        <span class="time">2 minutes ago</span>
      </div>

      <button class="action-btn">⋮</button>
    </div>

    <div class="notification">
      <div class="icon">💼</div>

      <div class="content">
        <p class="message">
          New job recommendation based on your profile.
        </p>
        <span class="time">1 hour ago</span>
      </div>

      <button class="action-btn">⋮</button>
    </div>

    <div class="notification">
      <div class="icon">⚠️</div>

      <div class="content">
        <p class="message">
          Suspicious login detected from a new device.
        </p>
        <span class="time">Yesterday</span>
      </div>

      <button class="action-btn">⋮</button>
    </div>

  </div>

  <!-- Empty State (optional) -->
  <!--
  <div class="empty-state">
    <p>No notifications yet</p>
  </div>
  -->

</div>
